# Image optimization via Netlify Image CDN.
# Only requests that carry the ?opt= marker are routed through the CDN (which
# serves AVIF/WebP, resizes, and recompresses); a plain /images/... path still
# serves the original file. That keeps local preview working and means images
# still show even if the transform service is unavailable. The CDN's own source
# fetch uses the plain path (no ?opt=), so there is no redirect loop.
[[redirects]]
  from = "/images/*"
  query = { opt = ":opt", w = ":w" }
  to = "/.netlify/images?url=/images/:splat&w=:w&q=72"
  status = 200
  force = true

[[redirects]]
  from = "/images/*"
  query = { opt = ":opt" }
  to = "/.netlify/images?url=/images/:splat&q=72"
  status = 200
  force = true

# Performance: long cache for static assets (image/css/js filenames are stable)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Light security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=()"

# Serverless functions (lead SMS alert)
[functions]
  directory = "netlify/functions"
